<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<meta name="theme-color" content="#faf7f2">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>家計簿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap');
:root {
  --bg:#faf7f2; --surface:#fff; --surface2:#f3ede4; --border:#e8ddd0;
  --text:#2a2118; --dim:#9a8e82; --accent:#c17f3a; --al:#f5e6d0;
  --red:#c94040; --rl:#fde8e8; --blue:#3a6fc1; --bl:#e0eafd;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  --r:16px; --rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-size:16px!important;touch-action:manipulation}
body{font-family:'Noto Serif JP',serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;padding-top:var(--safe-top)}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.app-title{font-size:17px;font-weight:700;color:var(--accent)}
.period-nav{display:flex;align-items:center;gap:8px}
.nav-btn{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.nav-btn:active{background:var(--border)}
.period-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);min-width:110px;text-align:center}


/* MAIN */
.main{padding:10px 10px;padding-bottom:calc(72px + var(--safe-bottom))}
.page{display:none}.page.active{display:block}

/* SUMMARY */
.summary-bar{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 6px;margin-bottom:8px;gap:3px}
.sum-item{text-align:center}
.sum-label{font-size:9px;color:var(--dim);margin-bottom:3px;letter-spacing:.5px}
.sum-value{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.sum-value.inc{color:var(--blue)}.sum-value.exp{color:var(--red)}.sum-value.bal{color:var(--accent)}.sum-value.neg{color:var(--red)}
.carryover{grid-column:1/-1;text-align:center;font-size:9px;border-radius:6px;padding:4px 8px;margin-top:4px;font-family:'DM Mono',monospace}
.carryover.plus{color:var(--accent);background:var(--al)}
.carryover.minus{color:var(--red);background:var(--rl)}
.carryover.great{color:#fff;background:var(--accent);font-size:10px;font-weight:700;letter-spacing:.5px}

/* CALENDAR */
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.cal-dow{text-align:center;font-size:9px;font-weight:700;color:var(--dim);padding:3px 0}
.cal-dow.sun{color:var(--red)}.cal-dow.sat{color:var(--blue)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 2px 4px;min-height:44px;cursor:pointer;transition:background .12s}
.cal-cell:active{background:var(--surface2)}
.cal-cell.today{border-color:var(--accent)}
.cal-cell.today .cal-day{color:var(--accent)!important;font-weight:700}
.cal-cell.selected{background:var(--al);border-color:var(--accent)}
.cal-cell.out-period{background:repeating-linear-gradient(45deg,var(--surface2) 0,var(--surface2) 2px,var(--surface) 2px,var(--surface) 8px);opacity:.55}
.cal-cell.sun .cal-day{color:var(--red)}.cal-cell.sat .cal-day{color:var(--blue)}
.cal-day{font-size:10px;margin-bottom:2px;line-height:1}
.cal-amounts{display:flex;flex-direction:column;gap:0px}
.cal-inc{font-family:'DM Mono',monospace;font-size:7px;color:var(--blue);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-exp{font-family:'DM Mono',monospace;font-size:7px;color:var(--red);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* DAY DETAIL */
.day-detail{margin-top:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.day-detail-header{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.day-detail-title{font-size:13px;font-weight:700}
.day-add-btn{background:var(--accent);color:white;border:none;border-radius:14px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Serif JP',serif}
.day-add-btn:active{opacity:.8}
.day-empty{padding:20px;text-align:center;font-size:12px;color:var(--dim)}
.tx-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.tx-item:last-child{border-bottom:none}
.tx-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tx-icon.inc{background:var(--bl)}.tx-icon.exp{background:var(--rl)}
.tx-icon svg{width:18px;height:18px}
.tx-body{flex:1;min-width:0}
.tx-cat{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-memo{font-size:10px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-amt{font-family:'DM Mono',monospace;font-size:13px;flex-shrink:0}
.tx-amt.inc{color:var(--blue)}.tx-amt.exp{color:var(--red)}
.tx-del{background:none;border:none;color:var(--dim);font-size:14px;padding:4px;cursor:pointer;flex-shrink:0}
.tx-del:active{color:var(--red)}

/* BANK TAB */
.bank-input-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.sec-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.bank-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:end}
.field-label{font-size:10px;color:var(--dim);margin-bottom:4px}
.input-field{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:9px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;width:100%;outline:none;-webkit-appearance:none}
.input-field:focus{border-color:var(--accent)}
.input-field::placeholder{color:var(--dim)}
.sel-field{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:9px 8px;color:var(--text);font-size:12px;outline:none;-webkit-appearance:none;font-family:'Noto Serif JP',serif;max-width:100px}
.save-btn{background:var(--accent);color:white;border:none;border-radius:var(--rs);padding:10px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Serif JP',serif}
.save-btn:active{opacity:.8}

/* BANK MANAGE */
.bank-manage-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.bank-manage-input{flex:1}
.add-bank-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;font-size:12px;color:var(--text);cursor:pointer;white-space:nowrap;font-family:'Noto Serif JP',serif}
.add-bank-btn:active{background:var(--border)}
.bank-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.bank-tab-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-size:12px;color:var(--dim);cursor:pointer;font-family:'Noto Serif JP',serif;transition:all .15s;display:flex;align-items:center;gap:6px}
.bank-tab-btn.active{border-color:var(--accent);background:var(--al);color:var(--accent);font-weight:700}
.bank-tab-btn .del-bank{color:var(--dim);font-size:11px;margin-left:2px}

.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.chart-title{font-size:10px;color:var(--dim);letter-spacing:1px;margin-bottom:12px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:130px;padding-bottom:24px;position:relative}
.chart-bars::after{content:'';position:absolute;bottom:23px;left:0;right:0;border-bottom:1px solid var(--border)}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.bar-val{font-family:'DM Mono',monospace;font-size:7px;color:var(--dim);text-align:center;white-space:nowrap}
.bar{width:100%;background:var(--blue);border-radius:3px 3px 0 0;min-height:3px}
.bar.latest{background:var(--accent)}
.bar-lbl{font-size:8px;color:var(--dim);text-align:center;margin-top:2px;white-space:nowrap}
.bank-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.bank-item{display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border-radius:var(--rs);padding:8px 12px}
.bank-item-left{display:flex;flex-direction:column;gap:2px}
.bank-month{font-size:12px;color:var(--dim)}
.bank-name-badge{font-size:10px;color:var(--accent);background:var(--al);border-radius:4px;padding:1px 6px;display:inline-block}
.bank-amount{font-family:'DM Mono',monospace;font-size:14px;color:var(--blue)}
.bank-del{background:none;border:none;color:var(--dim);font-size:13px;padding:2px 6px;cursor:pointer}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(42,33,24,.6);z-index:200;display:flex;align-items:flex-start;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:0 0 var(--r) var(--r);padding:calc(var(--safe-top) + 12px) 16px 24px;width:100%;max-height:95dvh;overflow-y:auto;transform:translateY(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-close-btn{background:none;border:none;font-size:18px;color:var(--dim);cursor:pointer;padding:4px 8px}
.modal-title{font-size:15px;font-weight:700}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.type-btn{padding:9px;border-radius:var(--rs);border:2px solid var(--border);background:var(--surface2);color:var(--dim);font-weight:700;font-size:13px;cursor:pointer;text-align:center;font-family:'Noto Serif JP',serif}
.type-btn.active.income{border-color:var(--blue);background:var(--bl);color:var(--blue)}
.type-btn.active.expense{border-color:var(--red);background:var(--rl);color:var(--red)}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:var(--rs);border:2px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s}
.cat-btn.sel{border-color:var(--accent);background:var(--al)}
.cat-btn svg{width:22px;height:22px}
.cat-label{font-size:9px;color:var(--dim);text-align:center;line-height:1.2;font-family:'Noto Serif JP',serif}
.cat-btn.sel .cat-label{color:var(--accent);font-weight:700}

/* カスタムカテゴリ追加 */
.add-cat-toggle{display:flex;justify-content:flex-end;margin-bottom:6px}
.add-cat-toggle-btn{background:none;border:1px dashed var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--dim);cursor:pointer;font-family:'Noto Serif JP',serif}
.add-cat-toggle-btn:active{background:var(--surface2)}
.add-cat-panel{display:none;margin-bottom:10px}
.add-cat-panel.open{display:block}
.add-cat-row{display:grid;grid-template-columns:1fr 80px auto;gap:6px;margin-bottom:6px}
.add-cat-input{font-family:'Noto Serif JP',serif}
.add-cat-amount{font-family:'DM Mono',monospace}
.add-cat-btn{background:var(--accent);border:none;border-radius:var(--rs);padding:9px 12px;font-size:12px;color:white;font-weight:700;cursor:pointer;font-family:'Noto Serif JP',serif}
.add-cat-btn:active{opacity:.8}

.modal-field{margin-bottom:11px}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.btn-cancel{padding:12px;border-radius:var(--rs);background:var(--surface2);border:1px solid var(--border);color:var(--dim);font-weight:700;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:14px}
.btn-ok{padding:12px;border-radius:var(--rs);background:var(--accent);border:none;color:white;font-weight:700;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:14px}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:var(--safe-bottom)}
.bnav-btn{flex:1;padding:10px 8px 10px;text-align:center;background:none;border:none;cursor:pointer;color:var(--dim)}
.bnav-btn.active{color:var(--accent)}
.bnav-icon{font-size:20px}.bnav-label{font-size:9px;margin-top:1px;font-family:'Noto Serif JP',serif}
.empty{text-align:center;padding:28px;color:var(--dim);font-size:12px}

/* BACKUP */
.backup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.backup-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.backup-btn{padding:11px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--surface2);font-size:13px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Noto Serif JP',serif;display:flex;align-items:center;justify-content:center;gap:6px}
.backup-btn.export{border-color:var(--accent);color:var(--accent);background:var(--al)}
.backup-btn.import{border-color:var(--blue);color:var(--blue);background:var(--bl)}
.backup-btn:active{opacity:.7}
.backup-note{font-size:10px;color:var(--dim);margin-top:8px;line-height:1.6}
.backup-stamp{font-size:10px;color:var(--dim);margin-top:6px;font-family:'DM Mono',monospace}
</style>
</head>

  <div class="header-top">

    <div class="period-nav" id="periodNav">

// ── STORAGE ──
function getData()    { try{return JSON.parse(localStorage.getItem('kakeibo_v3')||'{}')}catch{return{}} }
function saveData(d)  { try{localStorage.setItem('kakeibo_v3',JSON.stringify(d))}catch(e){} }
function getTxs()     { return getData().transactions||[] }
function getBankRecs(){ return getData().bankRecords||[] }
function getBankList(){ return getData().banks||DEFAULT_BANKS }
function getCustomCats(type){ return (getData().customCats||{})[type]||[] }
function saveTxs(t)   { const d=getData();d.transactions=t;saveData(d) }
function saveBankRecs(r){ const d=getData();d.bankRecords=r;saveData(d) }
function saveBankList(b){ const d=getData();d.banks=b;saveData(d) }
function saveCustomCats(type,cats){ const d=getData();if(!d.customCats)d.customCats={};d.customCats[type]=cats;saveData(d) }

// ── HELPERS ──
function getPeriod(off){
  // 25日始まり60日区切り
  // 基準：各月25日スタート → 翌々月24日終わり
  const today=new Date();
  let y=today.getFullYear();let m=today.getMonth(); // 0-indexed
  // 今日が25日以降なら今月25日スタート、それ以前なら前月25日スタート
  const d=today.getDate();
  if(d<25){m-=1;if(m<0){m=11;y-=1}}
  // currentPeriodの開始は y年m月25日
  // offsetを適用（2ヶ月ずつ）
  let sm=m+off*2; let sy=y;
  while(sm<0){sm+=12;sy--}
  while(sm>11){sm-=12;sy++}
  const s=new Date(sy,sm,25);
  const e=new Date(sy,sm+2,24); // 2ヶ月後の24日
  return{start:s,end:e}
}
function fd(d){const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const dy=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dy}`}
function fm(n){return(n<0?'−':'')+'¥'+Math.abs(Math.round(n)).toLocaleString('ja-JP')}
function fms(n){return fm(n)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function getCatLabel(catId,type){
  const base=type==='income'?DEFAULT_CATS_INC:DEFAULT_CATS_EXP;
  const found=base.find(c=>c.id===catId);if(found)return found.label;
  const custom=getCustomCats(type);const cf=custom.find(c=>c.id===catId);
  return cf?cf.label:catId;
}
function getCatIcon(catId){return ICONS[catId]||ICONS.custom}

// ── RENDER KAKEIBO ──
function renderKakeibo(){
  const {start,end}=getPeriod(periodOffset);
  const lbl=s=>`${s.getMonth()+1}/${s.getDate()}`;
  // 期間が2ヶ月にまたがる場合、年をどちらで表示するか
  const yearLabel=start.getFullYear()===end.getFullYear()?`${start.getFullYear()} `:'';
  document.getElementById('periodLabel').textContent=`${yearLabel}${lbl(start)}〜${lbl(end)}`;
  const all=getTxs();
  const ptxs=all.filter(t=>t.date>=fd(start)&&t.date<=fd(end));
  const prev=getPeriod(periodOffset-1);
  const prevTxs=all.filter(t=>t.date>=fd(prev.start)&&t.date<=fd(prev.end));
  const prevBal=prevTxs.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);
  const income=ptxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=ptxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  // 残高は前期繰越を常に加算（プラスでもマイナスでも）
  const balance=income-expense+prevBal;
  // 繰越バッジの内容
  let carryoverHtml='';
  if(prevBal!==0){
    const sign=prevBal>0?'+':'';
    if(prevBal>=20000){
      carryoverHtml=`<div class="carryover great">🎉 えらい！前期繰越 ${sign}${fms(prevBal)}</div>`;
    } else if(prevBal>0){
      carryoverHtml=`<div class="carryover plus">前期繰越 ${sign}${fms(prevBal)}</div>`;
    } else {
      carryoverHtml=`<div class="carryover minus">前期繰越 ${sign}${fms(prevBal)}</div>`;
    }
  }
  document.getElementById('summaryBar').innerHTML=`
    <div class="sum-item"><div class="sum-label">収入</div><div class="sum-value inc">${fms(income)}</div></div>
    <div class="sum-item"><div class="sum-label">支出</div><div class="sum-value exp">${fms(expense)}</div></div>
    <div class="sum-item"><div class="sum-label">残高</div><div class="sum-value ${balance>=0?'bal':'neg'}">${fms(balance)}</div></div>
    ${carryoverHtml}
  `;
  // Calendar
  const calS=new Date(start);calS.setDate(calS.getDate()-calS.getDay());
  const calE=new Date(end);calE.setDate(calE.getDate()+(6-calE.getDay()));
  const dayMap={};
  ptxs.forEach(t=>{if(!dayMap[t.date])dayMap[t.date]={inc:0,exp:0};if(t.type==='income')dayMap[t.date].inc+=t.amount;else dayMap[t.date].exp+=t.amount});
  const today=fd(new Date());const cells=[];const cur=new Date(calS);
  while(cur<=calE){
    const ds=fd(cur);const dow=cur.getDay();
    const inP=ds>=fd(start)&&ds<=fd(end);const data=dayMap[ds];
    let cls='cal-cell';
    if(!inP)cls+=' out-period';
    if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';
    if(ds===today)cls+=' today';if(ds===selectedDate)cls+=' selected';
    const amts=data?`${data.inc>0?`<div class="cal-inc">+${fms(data.inc)}</div>`:''}${data.exp>0?`<div class="cal-exp">-${fms(data.exp)}</div>`:''}`:''
    cells.push(`<div class="${cls}" onclick="selectDay('${ds}')"><div class="cal-day">${cur.getDate()}</div><div class="cal-amounts">${amts}</div></div>`);
    cur.setDate(cur.getDate()+1);
  }
  document.getElementById('calGrid').innerHTML=cells.join('');
  renderDayDetail(selectedDate,ptxs);
}

let lastTapDate=null;let lastTapTime=0;
function selectDay(ds){
  const now=Date.now();
  if(lastTapDate===ds && now-lastTapTime<400){
    // ダブルタップ → 入力モーダル
    selectedDate=ds;
    openModal(null,ds);
    lastTapDate=null;
    return;
  }
  lastTapDate=ds;lastTapTime=now;
  selectedDate=selectedDate===ds?null:ds;
  renderKakeibo();
  if(selectedDate){setTimeout(()=>document.getElementById('dayDetail').scrollIntoView({behavior:'smooth',block:'nearest'}),80)}
}

function renderDayDetail(ds,ptxs){
  const el=document.getElementById('dayDetail');
  if(!ds){el.innerHTML='';return}
  const d=new Date(ds+'T00:00:00');
  const DOW=['日','月','火','水','木','金','土'];
  const label=`${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;
  const txs=ptxs.filter(t=>t.date===ds);
  const txHtml=txs.length===0?`<div class="day-empty">取引がありません</div>`:txs.map(t=>`
    <div class="tx-item">
      <div class="tx-icon ${t.type==='income'?'inc':'exp'}" style="color:var(--accent)">${getCatIcon(t.cat)}</div>
      <div class="tx-body">
        <div class="tx-cat">${esc(getCatLabel(t.cat,t.type))}</div>
        ${t.memo?`<div class="tx-memo">${esc(t.memo)}</div>`:''}
      </div>
      <div class="tx-amt ${t.type==='income'?'inc':'exp'}">${t.type==='income'?'+':'-'}${fm(t.amount)}</div>
      <button class="tx-del" onclick="deleteTx('${t.id}')">✕</button>
    </div>`).join('');
  el.innerHTML=`<div class="day-detail">
    <div class="day-detail-header">
      <div class="day-detail-title">${label}</div>
      <button class="day-add-btn" onclick="openModal(null,'${ds}')">＋ 追加</button>
    </div>${txHtml}</div>`;
}

// ── BANK ──
function renderBankTabs(){
  const banks=getBankList();
  const el=document.getElementById('bankTabs');
  // -1 = 合計タブ
  const allBtn=`<button class="bank-tab-btn ${activeBankIdx===-1?'active':''}" onclick="selectBank(-1)">合計</button>`;
  const bankBtns=banks.map((b,i)=>`
    <button class="bank-tab-btn ${i===activeBankIdx?'active':''}" onclick="selectBank(${i})">
      ${esc(b)}
      ${banks.length>1?`<span class="del-bank" onclick="deleteBank(event,${i})">✕</span>`:''}
    </button>`).join('');
  el.innerHTML=allBtn+bankBtns;
}

function selectBank(i){activeBankIdx=i;renderBankTabs();renderBank()}

function addBank(){
  const name=document.getElementById('newBankName').value.trim();
  if(!name)return;
  const banks=getBankList();
  if(banks.includes(name)){alert('同じ名前の銀行が既にあります');return}
  banks.push(name);saveBankList(banks);
  activeBankIdx=banks.length-1;
  document.getElementById('newBankName').value='';
  renderBankTabs();renderBank();
}

function deleteBank(e,i){
  e.stopPropagation();
  const banks=getBankList();
  if(banks.length<=1){alert('最低1つは必要です');return}
  if(!confirm(`「${banks[i]}」を削除しますか？\n記録データも削除されます`))return;
  const bankName=banks[i];
  banks.splice(i,1);saveBankList(banks);
  // その銀行の記録も削除
  saveBankRecs(getBankRecs().filter(r=>r.bank!==bankName));
  activeBankIdx=Math.min(activeBankIdx,banks.length-1);
  renderBankTabs();renderBank();
}

function renderBank(){
  const banks=getBankList();
  const chart=document.getElementById('chartBars');
  const list=document.getElementById('bankList');
  const allRecs=getBankRecs();

  if(activeBankIdx===-1){
    // 合計タブ：月ごとに全口座の合計を集計
    document.getElementById('chartTitle').textContent='全口座 合計残高推移';
    const monthMap={};
    allRecs.forEach(r=>{
      if(!monthMap[r.month])monthMap[r.month]=0;
      monthMap[r.month]+=r.amount;
    });
    const months=Object.keys(monthMap).sort();
    if(!months.length){chart.innerHTML=`<div class="empty" style="width:100%">記録がありません</div>`;list.innerHTML='';return}
    const totals=months.map(m=>({month:m,amount:monthMap[m]}));
    const max=Math.max(...totals.map(t=>t.amount));
    const recent=totals.slice(-12);
    chart.innerHTML=recent.map((r,i)=>{
      const pct=max>0?(r.amount/max)*100:0;
      const lbl=r.month.slice(2,4)+'/'+r.month.slice(5,7);
      return`<div class="bar-wrap"><div class="bar-val">${fm(r.amount)}</div><div class="bar ${i===recent.length-1?'latest':''}" style="height:${Math.max(3,pct*0.8)}%"></div><div class="bar-lbl">${lbl}</div></div>`;
    }).join('');
    // リスト：月ごとに内訳も表示
    list.innerHTML=totals.slice().reverse().slice(0,6).map(r=>{
      const breakdown=banks.map(b=>{
        const rec=allRecs.find(a=>a.month===r.month&&a.bank===b);
        return rec?`<div style="font-size:9px;color:var(--dim)">${esc(b)}: ${fm(rec.amount)}</div>`:'';
      }).join('');
      return`<div class="bank-item" style="flex-direction:column;align-items:flex-start;gap:4px">
        <div style="display:flex;justify-content:space-between;width:100%">
          <div class="bank-month">${r.month}</div>
          <div class="bank-amount">${fm(r.amount)}</div>
        </div>
        <div>${breakdown}</div>
      </div>`;
    }).join('');
  } else {
    // 個別口座タブ
    const bankName=banks[activeBankIdx]||'';
    document.getElementById('chartTitle').textContent=`${bankName} 残高推移`;
    const recs=allRecs.filter(r=>r.bank===bankName).sort((a,b)=>a.month.localeCompare(b.month));
    if(!recs.length){chart.innerHTML=`<div class="empty" style="width:100%">記録がありません</div>`;list.innerHTML='';return}
    const max=Math.max(...recs.map(r=>r.amount));
    const recent=recs.slice(-12);
    chart.innerHTML=recent.map((r,i)=>{
      const pct=max>0?(r.amount/max)*100:0;
      const lbl=r.month.slice(2,4)+'/'+r.month.slice(5,7);
      return`<div class="bar-wrap"><div class="bar-val">${fm(r.amount)}</div><div class="bar ${i===recent.length-1?'latest':''}" style="height:${Math.max(3,pct*0.8)}%"></div><div class="bar-lbl">${lbl}</div></div>`;
    }).join('');
    list.innerHTML=recs.slice().reverse().slice(0,6).map(r=>`
      <div class="bank-item">
        <div class="bank-item-left">
          <div class="bank-month">${r.month}</div>
          <div class="bank-name-badge">${esc(r.bank)}</div>
        </div>
        <div class="bank-amount">${fm(r.amount)}</div>
        <button class="bank-del" onclick="deleteBankRec('${r.month}','${esc(r.bank)}')">✕</button>
      </div>`).join('');
  }
}

function initBankSel(){
  const sel=document.getElementById('bankMonth');
  const now=new Date();const opts=[];
  for(let i=0;i<24;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const val=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    opts.push(`<option value="${val}">${d.getFullYear()}/${d.getMonth()+1}</option>`);
  }
  sel.innerHTML=opts.join('');
}

function saveBank(){
  const banks=getBankList();
  const bankName=banks[activeBankIdx]||'';
  const month=document.getElementById('bankMonth').value;
  const amount=parseFloat(document.getElementById('bankAmount').value);
  if(!month||isNaN(amount)||amount<0){alert('月と金額を入力してください');return}
  const recs=getBankRecs().filter(r=>!(r.month===month&&r.bank===bankName));
  recs.push({month,amount,bank:bankName});saveBankRecs(recs);
  document.getElementById('bankAmount').value='';
  renderBank();
}

function deleteBankRec(month,bank){
  if(!confirm(`${month} (${bank})の記録を削除しますか？`))return;
  saveBankRecs(getBankRecs().filter(r=>!(r.month===month&&r.bank===bank)));
  renderBank();
}

// ── MODAL ──
function openModal(id,defaultDate){
  editId=id||null;
  modalDate=defaultDate||selectedDate||fd(new Date());
  const tx=id?getTxs().find(t=>t.id===id):null;
  modalType=tx?tx.type:'expense';
  selectedCat=tx?tx.cat:'food';
  document.getElementById('modalTitle').textContent=tx?'取引を編集':'取引を追加';
  document.getElementById('txMemo').value=tx?(tx.memo||''):'';
  const initAmt=tx?tx.amount:null;document.getElementById('txAmount').value=initAmt?Number(initAmt).toLocaleString('ja-JP'):'';
  document.getElementById('txDate').value=tx?tx.date:modalDate;
  document.getElementById('newCatName').value='';document.getElementById('addCatPanel').classList.remove('open');
  updateTypeBtns();renderCatGrid();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal()}
function setType(t){
  modalType=t;
  selectedCat=t==='income'?'salary':'food';
  updateTypeBtns();renderCatGrid();
}
function updateTypeBtns(){
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.type-btn.${modalType}`).classList.add('active');
}
function renderCatGrid(){
  const base=modalType==='income'?DEFAULT_CATS_INC:DEFAULT_CATS_EXP;
  const custom=getCustomCats(modalType);
  const all=[...base,...custom];
  document.getElementById('catGrid').innerHTML=all.map(c=>`
    <div class="cat-btn ${c.id===selectedCat?'sel':''}" onclick="selCat('${c.id}')">
      <span style="color:var(--accent)">${getCatIcon(c.id)}</span>
      <span class="cat-label">${esc(c.label)}</span>
    </div>`).join('');
}
function selCat(id){
  selectedCat=id;
  // カスタムカテゴリのデフォルト金額があればセット
  const custom=getCustomCats(modalType);
  const cat=custom.find(c=>c.id===id);
  if(cat&&cat.defAmount&&!document.getElementById('txAmount').value){
    document.getElementById('txAmount').value=cat.defAmount;
    updateAmountDisplay(cat.defAmount);
  }
  renderCatGrid();
}

function toggleAddCat(){
  document.getElementById('addCatPanel').classList.toggle('open');
}
function addCustomCat(){
  const name=document.getElementById('newCatName').value.trim();
  if(!name){alert('カテゴリ名を入力してください');return}
  const amountStr=document.getElementById('newCatAmount').value;
  const defAmount=amountStr?parseFloat(amountStr):null;
  const id='custom_'+Date.now();
  const cats=getCustomCats(modalType);
  cats.push({id,label:name,defAmount});
  saveCustomCats(modalType,cats);
  selectedCat=id;
  // デフォルト金額があればセット
  if(defAmount){
    document.getElementById('txAmount').value=defAmount;
    updateAmountDisplay(defAmount);
  }
  document.getElementById('newCatName').value='';document.getElementById('addCatPanel').classList.remove('open');
  document.getElementById('newCatAmount').value='';
  document.getElementById('addCatPanel').classList.remove('open');
  renderCatGrid();
}

function saveTx(){
  const amount=parseFloat(document.getElementById('txAmount').value.replace(/,/g,''));
  const date=document.getElementById('txDate').value;
  const memo=document.getElementById('txMemo').value.trim();
  if(!selectedCat){alert('カテゴリを選んでください');return}
  if(isNaN(amount)||amount<=0){alert('正しい金額を入力してください');return}
  if(!date){alert('日付を入力してください');return}
  const txs=getTxs();
  if(editId){const i=txs.findIndex(t=>t.id===editId);if(i>-1)txs[i]={...txs[i],type:modalType,cat:selectedCat,amount,date,memo}}
  else{txs.push({id:Date.now().toString(),type:modalType,cat:selectedCat,amount,date,memo})}
  saveTxs(txs);selectedDate=date;closeModal();renderKakeibo();
  setTimeout(()=>document.getElementById('dayDetail')?.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

function deleteTx(id){
  if(!confirm('この取引を削除しますか？'))return;
  saveTxs(getTxs().filter(t=>t.id!==id));renderKakeibo();
}

// ── NAV ──
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  document.getElementById('periodNav').style.display=name==='bank'?'none':'flex';
  if(name==='bank'){renderBankTabs();renderBank()}
  if(name==='kakeibo')renderKakeibo();
  if(name==='backup'){document.getElementById('backupStamp').textContent=''}
}
function changePeriod(delta){periodOffset+=delta;selectedDate=null;renderKakeibo()}

// ── BACKUP ──
function exportData(){
  const data=getData();
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const now=new Date();
  const stamp=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  const a=document.createElement('a');
  a.href=url;a.download=`kakeibo_backup_${stamp}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  document.getElementById('backupStamp').textContent=`最終書き出し：${now.toLocaleString('ja-JP')}`;
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  if(!confirm('現在のデータをすべて上書きします。よろしいですか？')){e.target.value='';return}
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(typeof data!=='object'||Array.isArray(data))throw new Error();
      saveData(data);
      alert('読み込み完了！データを復元しました。');
      renderBankTabs();renderKakeibo();
      document.getElementById('backupStamp').textContent=`最終読み込み：${new Date().toLocaleString('ja-JP')} (${file.name})`;
    }catch{alert('ファイルが正しくありません。書き出したJSONファイルを選択してください。')}
    e.target.value='';
  };
  reader.readAsText(file);
}

function formatAmountInput(el){
  const raw=el.value.replace(/[^0-9]/g,'');
  if(!raw){el.value='';return}
  el.value=Number(raw).toLocaleString('ja-JP');
}
function updateAmountDisplay(val){
  document.getElementById('txAmount').value=val?Number(val).toLocaleString('ja-JP'):'';
}
if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}

initBankSel();
renderBankTabs();
renderKakeibo();
</script>
