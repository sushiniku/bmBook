<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<meta name="theme-color" content="#faf7f2">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>家計簿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap');

:root {
  --bg: #faf7f2;
  --surface: #ffffff;
  --surface2: #f3ede4;
  --border: #e8ddd0;
  --text: #2a2118;
  --text-dim: #9a8e82;
  --accent: #c17f3a;
  --accent-light: #f5e6d0;
  --red: #c94040;
  --red-light: #fde8e8;
  --blue: #3a6fc1;
  --blue-light: #e0eafd;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Serif JP', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-top: var(--safe-top);
}

.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 0;
}
.header-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.app-title { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
.period-nav { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-size: 16px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.nav-btn:active { background: var(--border); }
.period-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--text-dim);
  min-width: 110px; text-align: center;
}
.tabs { display: flex; }
.tab {
  flex: 1; padding: 8px 4px; text-align: center;
  font-size: 12px; font-weight: 700; color: var(--text-dim);
  border-bottom: 2px solid transparent; cursor: pointer; transition: all .15s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.main { padding: 14px 12px; padding-bottom: calc(72px + var(--safe-bottom)); }
.page { display: none; }
.page.active { display: block; }

.summary-bar {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 8px;
  margin-bottom: 12px; gap: 4px;
}
.sum-item { text-align: center; }
.sum-label { font-size: 9px; color: var(--text-dim); margin-bottom: 3px; letter-spacing: .5px; }
.sum-value { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
.sum-value.inc { color: var(--blue); }
.sum-value.exp { color: var(--red); }
.sum-value.bal { color: var(--accent); }
.sum-value.neg { color: var(--red); }
.carryover {
  grid-column: 1/-1; text-align: center;
  font-size: 9px; color: var(--accent);
  background: var(--accent-light); border-radius: 6px;
  padding: 3px 8px; margin-top: 4px;
}

.cal-header { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 3px; }
.cal-dow { text-align: center; font-size: 9px; font-weight: 700; color: var(--text-dim); padding: 3px 0; }
.cal-dow.sun { color: var(--red); }
.cal-dow.sat { color: var(--blue); }

.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-cell {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px 3px 5px;
  min-height: 56px; cursor: pointer; transition: background .12s;
}
.cal-cell:active { background: var(--surface2); }
.cal-cell.today { border-color: var(--accent); }
.cal-cell.today .cal-day { color: var(--accent); font-weight: 700; }
.cal-cell.selected { background: var(--accent-light); border-color: var(--accent); }
.cal-cell.out-period {
  background: repeating-linear-gradient(
    45deg, var(--surface2) 0, var(--surface2) 2px, var(--surface) 2px, var(--surface) 8px
  );
  opacity: 0.55;
}
.cal-cell.sun .cal-day { color: var(--red); }
.cal-cell.sat .cal-day { color: var(--blue); }
.cal-cell.today .cal-day { color: var(--accent) !important; }
.cal-day { font-size: 11px; margin-bottom: 3px; }
.cal-amounts { display: flex; flex-direction: column; gap: 1px; }
.cal-inc { font-family: 'DM Mono',monospace; font-size: 8px; color: var(--blue); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-exp { font-family: 'DM Mono',monospace; font-size: 8px; color: var(--red); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.day-detail {
  margin-top: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.day-detail-header {
  padding: 11px 14px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.day-detail-title { font-size: 13px; font-weight: 700; }
.day-add-btn {
  background: var(--accent); color: white; border: none;
  border-radius: 14px; padding: 4px 12px;
  font-size: 11px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Serif JP', serif;
}
.day-add-btn:active { opacity: .8; }
.day-empty { padding: 20px; text-align: center; font-size: 12px; color: var(--text-dim); }

.tx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
}
.tx-item:last-child { border-bottom: none; }
.tx-dot {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.tx-dot.inc { background: var(--blue-light); }
.tx-dot.exp { background: var(--red-light); }
.tx-body { flex: 1; min-width: 0; }
.tx-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-memo { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.tx-amt { font-family: 'DM Mono',monospace; font-size: 13px; flex-shrink: 0; }
.tx-amt.inc { color: var(--blue); }
.tx-amt.exp { color: var(--red); }
.tx-del { background: none; border: none; color: var(--text-dim); font-size: 14px; padding: 4px; cursor: pointer; flex-shrink: 0; }
.tx-del:active { color: var(--red); }

/* BANK */
.bank-input-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
.bank-row { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: end; }
.field-label { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
.input-field {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 10px;
  color: var(--text); font-family: 'DM Mono',monospace;
  font-size: 14px; width: 100%; outline: none; -webkit-appearance: none;
}
.input-field:focus { border-color: var(--accent); }
.input-field::placeholder { color: var(--text-dim); }
.month-sel {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 6px;
  color: var(--text); font-size: 12px; outline: none; -webkit-appearance: none;
  max-width: 90px; font-family: 'Noto Serif JP',serif;
}
.save-btn {
  background: var(--accent); color: white; border: none;
  border-radius: var(--radius-sm); padding: 10px 12px;
  font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  font-family: 'Noto Serif JP',serif;
}
.save-btn:active { opacity: .8; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.chart-title { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 12px; }
.chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 130px; padding-bottom: 24px; position: relative; }
.chart-bars::after { content:''; position: absolute; bottom: 23px; left:0; right:0; border-bottom: 1px solid var(--border); }
.bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; height:100%; justify-content:flex-end; }
.bar-val { font-family:'DM Mono',monospace; font-size:7px; color:var(--text-dim); text-align:center; white-space:nowrap; }
.bar { width:100%; background:var(--blue); border-radius:3px 3px 0 0; min-height:3px; }
.bar.latest { background: var(--accent); }
.bar-lbl { font-size:8px; color:var(--text-dim); text-align:center; margin-top:2px; white-space:nowrap; }
.bank-list { margin-top:10px; display:flex; flex-direction:column; gap:5px; }
.bank-item { display:flex; justify-content:space-between; align-items:center; background:var(--surface2); border-radius:var(--radius-sm); padding:8px 12px; }
.bank-month { font-size:12px; color:var(--text-dim); }
.bank-amount { font-family:'DM Mono',monospace; font-size:14px; color:var(--blue); }
.bank-del { background:none; border:none; color:var(--text-dim); font-size:13px; padding:2px 6px; cursor:pointer; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(42,33,24,.6);
  z-index: 200; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background: var(--bg); border-radius: var(--radius) var(--radius) 0 0;
  padding: 18px 16px; padding-bottom: calc(28px + var(--safe-bottom));
  width: 100%; max-height: 92dvh; overflow-y: auto;
  transform: translateY(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 14px; }
.modal-title { font-size:15px; font-weight:700; margin-bottom:14px; }
.type-toggle { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:12px; }
.type-btn {
  padding:9px; border-radius:var(--radius-sm);
  border:2px solid var(--border); background:var(--surface2);
  color:var(--text-dim); font-weight:700; font-size:13px;
  cursor:pointer; text-align:center; font-family:'Noto Serif JP',serif;
}
.type-btn.active.income { border-color:var(--blue); background:var(--blue-light); color:var(--blue); }
.type-btn.active.expense { border-color:var(--red); background:var(--red-light); color:var(--red); }
.emoji-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; margin-bottom:12px; }
.emoji-btn {
  aspect-ratio:1; border-radius:var(--radius-sm);
  background:var(--surface2); border:2px solid transparent;
  font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.emoji-btn.sel { border-color:var(--accent); background:var(--accent-light); }
.modal-field { margin-bottom:11px; }
.modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.btn-cancel {
  padding:12px; border-radius:var(--radius-sm);
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text-dim); font-weight:700; cursor:pointer;
  font-family:'Noto Serif JP',serif; font-size:14px;
}
.btn-ok {
  padding:12px; border-radius:var(--radius-sm);
  background:var(--accent); border:none; color:white;
  font-weight:700; cursor:pointer; font-family:'Noto Serif JP',serif; font-size:14px;
}

.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; z-index:100; padding-bottom:var(--safe-bottom);
}
.bnav-btn { flex:1; padding:10px 8px 10px; text-align:center; background:none; border:none; cursor:pointer; color:var(--text-dim); }
.bnav-btn.active { color:var(--accent); }
.bnav-icon { font-size:20px; }
.bnav-label { font-size:9px; margin-top:1px; font-family:'Noto Serif JP',serif; }

.sec-title { font-size:10px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.empty { text-align:center; padding:28px; color:var(--text-dim); font-size:12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">📒 家計簿</div>
    <div class="period-nav" id="periodNav">
      <button class="nav-btn" onclick="changePeriod(-1)">‹</button>
      <div class="period-label" id="periodLabel">--</div>
      <button class="nav-btn" onclick="changePeriod(1)">›</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showPage('kakeibo')">収支</div>
    <div class="tab" onclick="showPage('bank')">口座残高</div>
  </div>
</div>

<div class="main">
  <div class="page active" id="page-kakeibo">
    <div class="summary-bar" id="summaryBar"></div>
    <div class="cal-header">
      <div class="cal-dow sun">日</div><div class="cal-dow">月</div>
      <div class="cal-dow">火</div><div class="cal-dow">水</div>
      <div class="cal-dow">木</div><div class="cal-dow">金</div>
      <div class="cal-dow sat">土</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div id="dayDetail"></div>
  </div>

  <div class="page" id="page-bank">
    <div class="bank-input-card">
      <div class="sec-title">残高を記録</div>
      <div class="bank-row">
        <div>
          <div class="field-label">年月</div>
          <select class="month-sel" id="bankMonth"></select>
        </div>
        <div>
          <div class="field-label">金額 (円)</div>
          <input class="input-field" type="number" id="bankAmount" placeholder="1000000" inputmode="numeric">
        </div>
        <button class="save-btn" onclick="saveBank()">記録</button>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">残高推移</div>
      <div class="chart-bars" id="chartBars"></div>
      <div class="bank-list" id="bankList"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="bnav-btn active" id="nav-kakeibo" onclick="showPage('kakeibo')">
    <div class="bnav-icon">📒</div><div class="bnav-label">収支</div>
  </button>
  <button class="bnav-btn" id="nav-bank" onclick="showPage('bank')">
    <div class="bnav-icon">🏦</div><div class="bnav-label">口座残高</div>
  </button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">取引を追加</div>
    <div class="type-toggle">
      <div class="type-btn active income" onclick="setType('income')">収入 ＋</div>
      <div class="type-btn expense" onclick="setType('expense')">支出 −</div>
    </div>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div class="modal-field">
      <div class="field-label">名称</div>
      <input class="input-field" type="text" id="txName" placeholder="例：給与、食費…">
    </div>
    <div class="modal-field">
      <div class="field-label">金額 (円)</div>
      <input class="input-field" type="number" id="txAmount" placeholder="0" inputmode="numeric">
    </div>
    <div class="modal-field">
      <div class="field-label">日付</div>
      <input class="input-field" type="date" id="txDate">
    </div>
    <div class="modal-field">
      <div class="field-label">メモ (任意)</div>
      <input class="input-field" type="text" id="txMemo" placeholder="備考…">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-ok" onclick="saveTx()">保存</button>
    </div>
  </div>
</div>

<script>
let periodOffset = 0;
let selectedDate = null;
let modalType = 'income';
let selectedEmoji = '💴';
let editId = null;
let modalDate = null;

const EI = ['💴','💰','🏧','🎁','📈','🏆','💼','🌟'];
const EE = ['🛒','🍜','🚗','🏠','👕','🎮','💊','✈️','📱','💡','🍺','📚'];

function getData()    { try{return JSON.parse(localStorage.getItem('kakeibo_v2')||'{}')}catch{return{}} }
function saveData(d)  { try{localStorage.setItem('kakeibo_v2',JSON.stringify(d))}catch(e){} }
function getTxs()     { return getData().transactions||[] }
function getBanks()   { return getData().bankRecords||[] }
function saveTxs(t)   { const d=getData();d.transactions=t;saveData(d) }
function saveBanks(r) { const d=getData();d.bankRecords=r;saveData(d) }

function getPeriod(off) {
  const today=new Date();
  const soy=new Date(today.getFullYear(),0,1);
  const doy=Math.floor((today-soy)/86400000);
  const idx=Math.floor(doy/60)+off;
  const s=new Date(soy); s.setDate(s.getDate()+idx*60);
  const e=new Date(s); e.setDate(e.getDate()+59);
  return {start:s,end:e};
}
function fd(d) { return d.toISOString().slice(0,10) }
function fm(n) { return (n<0?'−':'')+'¥'+Math.abs(Math.round(n)).toLocaleString('ja-JP') }
function fms(n) {
  const a=Math.abs(n);
  if(a>=1000000)return(n<0?'-':'')+(a/1000000).toFixed(1)+'M';
  if(a>=10000)return(n<0?'-':'')+(a/10000).toFixed(0)+'万';
  return fm(n);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderKakeibo() {
  const {start,end}=getPeriod(periodOffset);
  const lbl=s=>`${s.getMonth()+1}/${s.getDate()}`;
  document.getElementById('periodLabel').textContent=`${start.getFullYear()} ${lbl(start)}〜${lbl(end)}`;

  const all=getTxs();
  const ptxs=all.filter(t=>t.date>=fd(start)&&t.date<=fd(end));
  const prev=getPeriod(periodOffset-1);
  const prevTxs=all.filter(t=>t.date>=fd(prev.start)&&t.date<=fd(prev.end));
  const prevBal=prevTxs.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);
  const income=ptxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=ptxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance=income-expense+(prevBal>0?prevBal:0);

  document.getElementById('summaryBar').innerHTML=`
    <div class="sum-item"><div class="sum-label">収入</div><div class="sum-value inc">${fms(income)}</div></div>
    <div class="sum-item"><div class="sum-label">支出</div><div class="sum-value exp">${fms(expense)}</div></div>
    <div class="sum-item"><div class="sum-label">残高</div><div class="sum-value ${balance>=0?'bal':'neg'}">${fms(balance)}</div></div>
    ${prevBal>0?`<div class="carryover">前期繰越 +${fms(prevBal)}</div>`:''}
  `;

  // カレンダー
  const calS=new Date(start); calS.setDate(calS.getDate()-calS.getDay());
  const calE=new Date(end); calE.setDate(calE.getDate()+(6-calE.getDay()));

  const dayMap={};
  ptxs.forEach(t=>{
    if(!dayMap[t.date])dayMap[t.date]={inc:0,exp:0};
    if(t.type==='income')dayMap[t.date].inc+=t.amount;
    else dayMap[t.date].exp+=t.amount;
  });

  const today=fd(new Date());
  const cells=[];
  const cur=new Date(calS);
  while(cur<=calE){
    const ds=fd(cur);
    const dow=cur.getDay();
    const inP=ds>=fd(start)&&ds<=fd(end);
    const data=dayMap[ds];
    let cls='cal-cell';
    if(!inP)cls+=' out-period';
    if(dow===0)cls+=' sun';
    if(dow===6)cls+=' sat';
    if(ds===today)cls+=' today';
    if(ds===selectedDate)cls+=' selected';
    const amts=data?`
      ${data.inc>0?`<div class="cal-inc">+${fms(data.inc)}</div>`:''}
      ${data.exp>0?`<div class="cal-exp">-${fms(data.exp)}</div>`:''}
    `:'';
    cells.push(`<div class="${cls}" onclick="selectDay('${ds}')">
      <div class="cal-day">${cur.getDate()}</div>
      <div class="cal-amounts">${amts}</div>
    </div>`);
    cur.setDate(cur.getDate()+1);
  }
  document.getElementById('calGrid').innerHTML=cells.join('');
  renderDayDetail(selectedDate,ptxs);
}

function selectDay(ds) {
  selectedDate = selectedDate===ds ? null : ds;
  const {start,end}=getPeriod(periodOffset);
  const ptxs=getTxs().filter(t=>t.date>=fd(start)&&t.date<=fd(end));
  document.querySelectorAll('.cal-cell').forEach(el=>el.classList.remove('selected'));
  if(selectedDate){
    document.querySelectorAll('.cal-cell').forEach(el=>{
      if(el.querySelector('.cal-day') && el.getAttribute('onclick')===`selectDay('${selectedDate}')`)
        el.classList.add('selected');
    });
    // simpler: re-render
    renderKakeibo();
    setTimeout(()=>document.getElementById('dayDetail').scrollIntoView({behavior:'smooth',block:'nearest'}),80);
    return;
  }
  renderDayDetail(selectedDate,ptxs);
}

function renderDayDetail(ds,ptxs) {
  const el=document.getElementById('dayDetail');
  if(!ds){el.innerHTML='';return;}
  const d=new Date(ds+'T00:00:00');
  const DOW=['日','月','火','水','木','金','土'];
  const label=`${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;
  const txs=ptxs.filter(t=>t.date===ds);
  const txHtml=txs.length===0
    ?`<div class="day-empty">取引がありません</div>`
    :txs.map(t=>`<div class="tx-item">
      <div class="tx-dot ${t.type==='income'?'inc':'exp'}">${t.emoji}</div>
      <div class="tx-body">
        <div class="tx-name">${esc(t.name)}</div>
        ${t.memo?`<div class="tx-memo">${esc(t.memo)}</div>`:''}
      </div>
      <div class="tx-amt ${t.type==='income'?'inc':'exp'}">${t.type==='income'?'+':'-'}${fm(t.amount)}</div>
      <button class="tx-del" onclick="deleteTx('${t.id}')">✕</button>
    </div>`).join('');
  el.innerHTML=`<div class="day-detail">
    <div class="day-detail-header">
      <div class="day-detail-title">${label}</div>
      <button class="day-add-btn" onclick="openModal(null,'${ds}')">＋ 追加</button>
    </div>
    ${txHtml}
  </div>`;
}

// BANK
function renderBank() {
  const recs=getBanks().sort((a,b)=>a.month.localeCompare(b.month));
  const chart=document.getElementById('chartBars');
  const list=document.getElementById('bankList');
  if(!recs.length){chart.innerHTML=`<div class="empty" style="width:100%">記録がありません</div>`;list.innerHTML='';return;}
  const max=Math.max(...recs.map(r=>r.amount));
  const recent=recs.slice(-12);
  chart.innerHTML=recent.map((r,i)=>{
    const pct=max>0?(r.amount/max)*100:0;
    const lbl=r.month.slice(2,4)+'/'+r.month.slice(5,7);
    return`<div class="bar-wrap">
      <div class="bar-val">${fms(r.amount)}</div>
      <div class="bar ${i===recent.length-1?'latest':''}" style="height:${Math.max(3,pct*0.8)}%"></div>
      <div class="bar-lbl">${lbl}</div>
    </div>`;
  }).join('');
  list.innerHTML=recs.slice().reverse().slice(0,6).map(r=>`
    <div class="bank-item">
      <div class="bank-month">${r.month}</div>
      <div class="bank-amount">${fm(r.amount)}</div>
      <button class="bank-del" onclick="deleteBank('${r.month}')">✕</button>
    </div>`).join('');
}

function initBankSel() {
  const sel=document.getElementById('bankMonth');
  const now=new Date();const opts=[];
  for(let i=0;i<24;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const val=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    opts.push(`<option value="${val}">${d.getFullYear()}/${d.getMonth()+1}</option>`);
  }
  sel.innerHTML=opts.join('');
}

function saveBank() {
  const month=document.getElementById('bankMonth').value;
  const amount=parseFloat(document.getElementById('bankAmount').value);
  if(!month||isNaN(amount)||amount<0){alert('月と金額を入力してください');return;}
  const recs=getBanks().filter(r=>r.month!==month);
  recs.push({month,amount});saveBanks(recs);
  document.getElementById('bankAmount').value='';
  renderBank();
}
function deleteBank(month){
  if(!confirm(`${month}の記録を削除しますか？`))return;
  saveBanks(getBanks().filter(r=>r.month!==month));renderBank();
}

// MODAL
function openModal(id,defaultDate){
  editId=id||null;
  modalDate=defaultDate||selectedDate||fd(new Date());
  const tx=id?getTxs().find(t=>t.id===id):null;
  modalType=tx?tx.type:'income';
  selectedEmoji=tx?tx.emoji:'💴';
  document.getElementById('modalTitle').textContent=tx?'取引を編集':'取引を追加';
  document.getElementById('txName').value=tx?tx.name:'';
  document.getElementById('txAmount').value=tx?tx.amount:'';
  document.getElementById('txMemo').value=tx?(tx.memo||''):'';
  document.getElementById('txDate').value=tx?tx.date:modalDate;
  updateTypeBtns();renderEmojiGrid();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function setType(t){modalType=t;selectedEmoji=t==='income'?'💴':'🛒';updateTypeBtns();renderEmojiGrid();}
function updateTypeBtns(){
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.type-btn.${modalType}`).classList.add('active');
}
function renderEmojiGrid(){
  const emojis=modalType==='income'?EI:EE;
  document.getElementById('emojiGrid').innerHTML=emojis.map(e=>
    `<div class="emoji-btn ${e===selectedEmoji?'sel':''}" onclick="selEmoji('${e}')">${e}</div>`
  ).join('');
}
function selEmoji(e){selectedEmoji=e;renderEmojiGrid();}
function saveTx(){
  const name=document.getElementById('txName').value.trim();
  const amount=parseFloat(document.getElementById('txAmount').value);
  const date=document.getElementById('txDate').value;
  const memo=document.getElementById('txMemo').value.trim();
  if(!name){alert('名称を入力してください');return;}
  if(isNaN(amount)||amount<=0){alert('正しい金額を入力してください');return;}
  if(!date){alert('日付を入力してください');return;}
  const txs=getTxs();
  if(editId){const i=txs.findIndex(t=>t.id===editId);if(i>-1)txs[i]={...txs[i],type:modalType,name,amount,date,memo,emoji:selectedEmoji};}
  else{txs.push({id:Date.now().toString(),type:modalType,name,amount,date,memo,emoji:selectedEmoji});}
  saveTxs(txs);selectedDate=date;closeModal();renderKakeibo();
  setTimeout(()=>document.getElementById('dayDetail').scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}
function deleteTx(id){
  if(!confirm('この取引を削除しますか？'))return;
  saveTxs(getTxs().filter(t=>t.id!==id));renderKakeibo();
}

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  document.querySelectorAll('.tab')[name==='kakeibo'?0:1].classList.add('active');
  document.getElementById('periodNav').style.display=name==='bank'?'none':'flex';
  if(name==='bank')renderBank();
  if(name==='kakeibo')renderKakeibo();
}
function changePeriod(delta){periodOffset+=delta;selectedDate=null;renderKakeibo();}

if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

initBankSel();
renderKakeibo();
</script>
</body>
</html>
